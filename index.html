<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breach Shield | Leak Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            /* Dark Navy Background */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            /* Keep it behind the UI */
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        p {
            margin-bottom: 2rem;
            color: #94a3b8;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .breach-item {
            padding: 10px;
            border-bottom: 1px solid #444;
            color: #f87171;
        }

        .safe {
            color: #4ade80;
            text-align: center;
        }

        /* Simple Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="glass-container">
        <h1>Breach Shield</h1>
        <p>Check if your password has been compromised</p>

        <div class="input-group">
            <input type="email" id="passwordInput" placeholder="Enter your email address...">
            <button onclick="checkBreach()">Check Security</button>
        </div>

        <div id="loader" class="loader" style="display: none;"></div>
        <div id="result" class="result-box"></div>
    </div>

    <script>
        // --- 1. BOUNCING BALLS ANIMATION ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let balls = [];
        for (let i = 0; i < 40; i++) {
            balls.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 4 + 2,
                dx: (Math.random() - 0.5) * 3, // Random speed X
                dy: (Math.random() - 0.5) * 3, // Random speed Y
                color: `rgba(59, 130, 246, ${Math.random()})`
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            balls.forEach(b => {
                b.x += b.dx;
                b.y += b.dy;
                // Bounce off walls
                if (b.x + b.radius > canvas.width || b.x - b.radius < 0) b.dx = -b.dx;
                if (b.y + b.radius > canvas.height || b.y - b.radius < 0) b.dy = -b.dy;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. API INTEGRATION (LEAKCHECK) ---
        async function checkBreach() {
            const password = document.getElementById('passwordInput').value;
            const display = document.getElementById('result');
            const loader = document.getElementById('loader'); // Get the loader

            if (!password) {
                display.style.color = "white";
                display.innerText = "Please enter a password first.";
                return;
            }

            // Show loader, clear previous results
            display.innerText = "";
            loader.style.display = "block";

            try {
                const msgUint8 = new TextEncoder().encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-1', msgUint8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

                const prefix = hashHex.slice(0, 5);
                const suffix = hashHex.slice(5);

                const response = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
                const data = await response.text();

                const lines = data.split('\n');
                let pwnedCount = 0;

                for (let line of lines) {
                    const [returnedSuffix, count] = line.trim().split(':');
                    if (returnedSuffix === suffix) {
                        pwnedCount = parseInt(count);
                        break;
                    }
                }

                // Hide loader before showing result
                loader.style.display = "none";

                if (pwnedCount > 0) {
                    display.style.color = "#f87171"; // Reddish
                    display.innerText = `⚠️ This password has appeared in ${pwnedCount.toLocaleString()} data breaches!`;
                } else {
                    display.style.color = "#4ade80"; // Greenish
                    display.innerText = "✅ This password was not found in any known leaks.";
                }

            } catch (error) {
                loader.style.display = "none";
                display.style.color = "white";
                display.innerText = "Error connecting to the breach database.";
                console.error(error);
            }
        }
        // Get the input element
        const passwordInput = document.getElementById('passwordInput');

        // Add the event listener for 'keypress' or 'keydown'
        passwordInput.addEventListener('keydown', function (event) {
            // Check if the key pressed was 'Enter'
            if (event.key === 'Enter') {
                // Prevent the default form submission (if any)
                event.preventDefault();

                // Trigger the checkBreach function
                checkBreach();
            }
        });
    </script>
</body>

</html>
