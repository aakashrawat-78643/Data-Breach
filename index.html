<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breach Shield | Leak Checker</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            /* Dark Navy Background */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            /* Keep it behind the UI */
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        p {
            margin-bottom: 2rem;
            color: #94a3b8;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .breach-item {
            padding: 10px;
            border-bottom: 1px solid #444;
            color: #f87171;
        }

        .safe {
            color: #4ade80;
            text-align: center;
        }

        /* Simple Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="glass-container">
        <h1>Breach Shield</h1>
        <p>Check if your email has been compromised</p>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Enter your email address...">
            <button onclick="checkBreach()">Check Security</button>
        </div>

        <div id="loader" class="loader" style="display: none;"></div>
        <div id="result" class="result-box"></div>
    </div>

    <script>
        // --- 1. BOUNCING BALLS ANIMATION ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let balls = [];
        for (let i = 0; i < 40; i++) {
            balls.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 4 + 2,
                dx: (Math.random() - 0.5) * 3, // Random speed X
                dy: (Math.random() - 0.5) * 3, // Random speed Y
                color: `rgba(59, 130, 246, ${Math.random()})`
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            balls.forEach(b => {
                b.x += b.dx;
                b.y += b.dy;
                // Bounce off walls
                if (b.x + b.radius > canvas.width || b.x - b.radius < 0) b.dx = -b.dx;
                if (b.y + b.radius > canvas.height || b.y - b.radius < 0) b.dy = -b.dy;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. API INTEGRATION (LEAKCHECK) ---
        // --- 1. BOUNCING BALLS ANIMATION (Keep your existing canvas code) ---
// [Existing animation code remains the same]

// --- 2. FIXED API INTEGRATION ---
function checkBreach() {
    const email = document.getElementById('emailInput').value.trim();
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const apiKey = "72d00d56ef994fcdb043d0ec0d1de7cd"; 

    if (!email) return alert("Please enter an email!");

    // UI Reset
    resultDiv.innerHTML = "";
    loader.style.display = "block";

    const url = `https://emailreputation.abstractapi.com/v1/?api_key=${apiKey}&email=${email}`;

    const xmlHttp = new XMLHttpRequest();
    
    // Set a timeout of 10 seconds so it doesn't load forever
    xmlHttp.timeout = 10000; 

    xmlHttp.onreadystatechange = function() {
        if (xmlHttp.readyState === 4) {
            loader.style.display = "none"; // Always hide loader when done
            
            if (xmlHttp.status === 200) {
                try {
                    const data = JSON.parse(xmlHttp.responseText);
                    renderResponse(data, resultDiv);
                } catch (e) {
                    resultDiv.innerHTML = `<p style="color:orange">Data error. The API sent back something unreadable.</p>`;
                }
            } else if (xmlHttp.status === 0) {
                resultDiv.innerHTML = `<p style="color:red">Network Blocked. Check your internet or Firewall.</p>`;
            } else {
                resultDiv.innerHTML = `<p style="color:red">Server Error: ${xmlHttp.status}.</p>`;
            }
        }
    };

    xmlHttp.ontimeout = function () {
        loader.style.display = "none";
        resultDiv.innerHTML = `<p style="color:orange">Request timed out. The server is taking too long.</p>`;
    };

    xmlHttp.open("GET", url, true);
    xmlHttp.send(null);
}

function renderResponse(data, container) {
    if (!data.email) {
        container.innerHTML = "<p>No data found for this email.</p>";
        return;
    }

    let score = (data.reputation_score * 100).toFixed(0);
    let color = score > 70 ? '#4ade80' : (score > 40 ? '#facc15' : '#f87171');

    // Building the HTML string
    let html = `<h4>Security Report: ${data.email}</h4>`;
    html += `<div style="font-size: 1.2rem; margin: 15px 0;">Safety Score: <span style="color:${color}">${score}%</span></div>`;

    // Check the values correctly (they are often objects {value: true/false})
    if (data.is_disposable_email && data.is_disposable_email.value) {
        html += `<div class="breach-item">🚩 Disposable/Temporary Email</div>`;
    }
    if (data.is_known_spammer && data.is_known_spammer.value) {
        html += `<div class="breach-item">🚩 WARNING: Known Spammer</div>`;
    }
    if (data.is_blacklisted && data.is_blacklisted.value) {
        html += `<div class="breach-item">🚩 WARNING: Blacklisted Email</div>`;
    }

    if (score >= 90) {
        html += `<p class="safe">✅ No immediate threats detected.</p>`;
    }

    container.innerHTML = html;
}
    </script>
</body>


</html>
