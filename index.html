<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breach Shield | Leak Checker</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            /* Dark Navy Background */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            /* Keep it behind the UI */
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        p {
            margin-bottom: 2rem;
            color: #94a3b8;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .breach-item {
            padding: 10px;
            border-bottom: 1px solid #444;
            color: #f87171;
        }

        .safe {
            color: #4ade80;
            text-align: center;
        }

        /* Simple Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="glass-container">
        <h1>Breach Shield</h1>
        <p>Check if your email has been compromised</p>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Enter your email address...">
            <button onclick="checkBreach()">Check Security</button>
        </div>

        <div id="loader" class="loader" style="display: none;"></div>
        <div id="result" class="result-box"></div>
    </div>

    <script>
        // --- 1. BOUNCING BALLS ANIMATION ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let balls = [];
        for (let i = 0; i < 40; i++) {
            balls.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 4 + 2,
                dx: (Math.random() - 0.5) * 3, // Random speed X
                dy: (Math.random() - 0.5) * 3, // Random speed Y
                color: `rgba(59, 130, 246, ${Math.random()})`
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            balls.forEach(b => {
                b.x += b.dx;
                b.y += b.dy;
                // Bounce off walls
                if (b.x + b.radius > canvas.width || b.x - b.radius < 0) b.dx = -b.dx;
                if (b.y + b.radius > canvas.height || b.y - b.radius < 0) b.dy = -b.dy;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. API INTEGRATION (LEAKCHECK) ---
        // --- 1. BOUNCING BALLS ANIMATION (Keep your existing canvas code) ---
// [Existing animation code remains the same]

// --- 2. FIXED API INTEGRATION ---
async function checkBreach() {
    const email = document.getElementById('emailInput').value.trim();
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');

    if (!email) return alert("Please enter an email!");

    resultDiv.innerHTML = "";
    loader.style.display = "block";

    // This API specifically lists company names and breach details
    const targetUrl = `https://api.xposedornot.com/v1/check-email/${email}`;
    // Using a more stable proxy for GitHub Pages
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        const wrapper = await response.json();
        
        loader.style.display = "none";

        // XposedOrNot status: 200 = Breached, 404 = Safe
        if (wrapper.status.http_code === 200) {
            const data = JSON.parse(wrapper.contents);
            const breachList = data.breaches[0]; // This is the list of company names

            resultDiv.innerHTML = `
                <h4 style="color:#f87171">⚠️ Data Breach Detected!</h4>
                <p style="margin-bottom:10px;">Your info was found in the following leaks:</p>
                <div id="breachContainer"></div>
            `;

            const container = document.getElementById('breachContainer');
            breachList.forEach(company => {
                const item = document.createElement('div');
                item.className = 'breach-item';
                item.innerHTML = `🚩 <strong>${company}</strong>`;
                container.appendChild(item);
            });
        } else if (wrapper.status.http_code === 404) {
            resultDiv.innerHTML = `<p class="safe">✅ Great news! This email was not found in any major data breaches.</p>`;
        } else {
            resultDiv.innerHTML = `<p style="color:orange">API Busy. Please try again in 1 minute.</p>`;
        }
    } catch (error) {
        loader.style.display = "none";
        console.error("Error:", error);
        resultDiv.innerHTML = `<p style="color:red">Connection error. Please check your internet.</p>`;
    }
}
    </script>
</body>


</html>
